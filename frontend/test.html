<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Header + Sidebar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f3f2;
      --panel: #ffffff;
      --text: #161313;
      --muted: #9b9290;
      --line: #e7e0de;
      --accent: #885f64;
      --shadow: 0 10px 24px rgba(74, 49, 52, 0.08);
      --header-h: 88px;
      --sidebar-w: 152px;
      --sidebar-left: 17px;
      --content-left: 188px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }

    body { overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }

    .app {
      min-height: 100vh;
      position: relative;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.78), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,0.32), rgba(255,255,255,0)),
        var(--bg);
    }

    /* ===== HEADER ===== */
    .topbar {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--header-h);
      z-index: 60;
      background: -webkit-linear-gradient(90deg, hsla(360, 76%, 65%, 1) 0%, hsla(310, 22%, 37%, 1) 100%);
      background: linear-gradient(90deg, hsla(360, 76%, 65%, 1) 0%, hsla(310, 22%, 37%, 1) 100%);
    }

    .topbar__inner {
      position: relative;
      max-width: 1440px;
      height: 100%;
      margin: 0 auto;
      padding: 0 34px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      gap: 24px;
    }

    .menu {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 28px;
      padding-top: 38px;
      white-space: nowrap;
    }

    .menu--right { justify-content: flex-end; }

    .menu__item {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 18px;
      line-height: 1;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: #191515;
      padding-bottom: 12px;
    }

    .menu__item.is-active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      border-radius: 999px;
      background: #1a1717;
    }

    .menu__chev {
      width: 10px;
      height: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transform: translateY(1px);
    }

    .menu__chev svg {
      width: 10px;
      height: 10px;
      fill: #2f2828;
    }

    .brand-stage {
      position: relative;
      width: 352px;
      height: 128px;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 4;
    }

    .brand-stage__shape {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 352px;
      height: 128px;
      display: block;
    }

    .brand {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--accent);
      user-select: none;
    }

    .brand__logo {
      width: 56px;
      height: 56px;
      display: block;
      margin-bottom: 1px;
    }

    .brand__name {
      font-size: 20px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .brand__sub {
      margin-top: 2px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      position: fixed;
      top: 119px;
      left: var(--sidebar-left);
      width: var(--sidebar-w);
      height: 458px;
      background: var(--panel);
      border-radius: 14px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(126, 93, 95, 0.07);
      z-index: 35;
      padding: 12px 12px 18px;
      display: flex;
      flex-direction: column;
    }

    .upgrade {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: flex-start;
      height: 32px;
      min-width: 112px;
      padding: 0 15px;
      border: 0;
      border-radius: 999px;
      color: #513a13;
      background: linear-gradient(180deg, #f5dd8b 0%, #c79833 100%);
      font-family: "Barlow Condensed", sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 4px 10px rgba(146, 103, 25, 0.18);
    }

    .upgrade::before {
      content: "";
      position: absolute;
      left: -5px;
      top: -6px;
      width: 21px;
      height: 21px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff0a5 0 24%, #d3a54c 25% 62%, #b78328 63% 100%);
      box-shadow: 0 2px 5px rgba(149, 104, 25, 0.22);
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 13px 2px 14px;
    }

    .search-copy {
      padding: 0 3px;
      color: #9f9592;
      font-size: 14px;
      line-height: 1.28;
      min-height: 34px;
      max-width: 112px;
    }

    .profile {
      padding-left: 10px;
      margin-top: 2px;
    }

    .avatar {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 12px;
      box-shadow: 0 4px 10px rgba(72, 49, 51, 0.12);
      background: #ddd;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile__name {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 22px;
      line-height: 1;
      font-weight: 600;
      color: #1a1616;
      letter-spacing: 0;
    }

    .sidebar__icons {
      margin-top: auto;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 31px;
    }

    .icon-btn {
      width: 46px;
      height: 46px;
      border: 0;
      background: transparent;
      padding: 0;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: #8c8786;
    }

    .icon-btn svg {
      width: 34px;
      height: 34px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      overflow: visible;
    }

    .icon-btn .badge {
      fill: #b9787e;
      stroke: #fff;
      stroke-width: 2;
    }

    /* ===== CONTENT AREA LEFT AS-IS ===== */
    .content-shell {
      min-height: 100vh;
      padding-top: 108px;
      padding-left: var(--content-left);
      padding-right: 16px;
      padding-bottom: 18px;
    }

    .content-placeholder {
      min-height: calc(100vh - 126px);
      background: transparent;
    }

    .menu__item:hover,
    .icon-btn:hover,
    .upgrade:hover {
      opacity: 0.94;
    }

    @media (max-width: 1180px) {
      .topbar__inner { grid-template-columns: 1fr; justify-items: center; }
      .menu { display: none; }
      .brand-stage { width: 300px; }
      .brand-stage__shape { width: 300px; }
    }

    @media (max-width: 760px) {
      :root {
        --sidebar-w: 118px;
        --content-left: 145px;
      }

      .sidebar {
        padding-inline: 10px;
      }

      .profile {
        padding-left: 0;
        text-align: center;
      }

      .avatar {
        margin-left: auto;
        margin-right: auto;
        width: 74px;
        height: 74px;
      }

      .profile__name { font-size: 18px; }
      .search-copy { max-width: none; }
      .upgrade { min-width: 96px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar__inner">
        <nav class="menu menu--left" aria-label="Left navigation">
          <a class="menu__item is-active" href="#">Dashboard</a>
          <a class="menu__item" href="#">E-Press Kit</a>
          <a class="menu__item" href="#">Pro Perks</a>
          <a class="menu__item" href="#">Release <span class="menu__chev"><svg viewBox="0 0 12 12" aria-hidden="true"><path d="M2 4.1 6 8l4-3.9"></path></svg></span></a>
        </nav>

        <div class="brand-stage" aria-hidden="true">
          <svg class="brand-stage__shape" viewBox="0 0 352 128" xmlns="http://www.w3.org/2000/svg">
            <path fill="#f6f3f2" d="M66 0H286V36C286 49 296 62 310 67C325 73 337 76 352 78V128H0V78C15 76 27 73 42 67C56 62 66 49 66 36V0Z"/>
            <path fill="#f8f6f5" d="M98 0H254V44C254 58 263 69 276 76C287 82 294 89 297 97C302 111 279 128 176 128C73 128 50 111 55 97C58 89 65 82 76 76C89 69 98 58 98 44V0Z"/>
          </svg>

          <div class="brand">
            <svg class="brand__logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <g fill="none" stroke="currentColor" stroke-width="5.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M33 8v15"/>
                <circle cx="32" cy="34" r="21"/>
              </g>
              <circle cx="37.5" cy="34" r="7.4" fill="currentColor"/>
            </svg>
            <div class="brand__name">Bouut.</div>
            <div class="brand__sub">music</div>
          </div>
        </div>

        <nav class="menu menu--right" aria-label="Right navigation">
          <a class="menu__item" href="#">Finance <span class="menu__chev"><svg viewBox="0 0 12 12" aria-hidden="true"><path d="M2 4.1 6 8l4-3.9"></path></svg></span></a>
          <a class="menu__item" href="#">Analytics</a>
          <a class="menu__item" href="#">Promo Tools</a>
          <a class="menu__item" href="#">Opportunities <span class="menu__chev"><svg viewBox="0 0 12 12" aria-hidden="true"><path d="M2 4.1 6 8l4-3.9"></path></svg></span></a>
        </nav>
      </div>
    </header>

    <aside class="sidebar" aria-label="Sidebar">
      <button class="upgrade">Upgrade Now</button>
      <div class="divider"></div>
      <div class="search-copy">Search artists,<br>tracks, playlists...</div>
      <div class="divider"></div>

      <div class="profile">
        <div class="avatar">
          <img src="https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?auto=format&fit=crop&w=220&q=80" alt="Sarah Jensen" />
        </div>
        <div class="profile__name">Sarah Jensen</div>
      </div>

      <div class="sidebar__icons">
        <button class="icon-btn" aria-label="Messages">
          <svg viewBox="0 0 32 32" aria-hidden="true">
            <path d="M7 18.4c0 3.3 3.2 5.9 7.2 5.9 1.1 0 2.2-.2 3.1-.6l4 1.5-1.1-3.2c.9-1 1.4-2.2 1.4-3.6 0-3.3-3.2-5.9-7.2-5.9S7 15.1 7 18.4Z"/>
            <path d="M12.1 11.5c1.1-3.2 4.5-5.4 8.7-5.4 5 0 9.2 3.2 9.2 7.2 0 1.8-.8 3.4-2.3 4.8l1.2 4-4.6-2.1c-1.1.5-2.3.7-3.6.7"/>
          </svg>
        </button>

        <button class="icon-btn" aria-label="Notifications">
          <svg viewBox="0 0 32 32" aria-hidden="true">
            <path d="M12.1 24.2h7.8"/>
            <path d="M10.6 23.8v-8.3c0-4 2-6.3 5.4-6.9 3.4.6 5.4 2.9 5.4 6.9v8.3"/>
            <path d="M12.9 24.2c.4 1.7 1.6 2.7 3.1 2.7s2.7-1 3.1-2.7"/>
            <path d="M13.1 9.9c0-1.8 1.3-3.2 2.9-3.2s2.9 1.4 2.9 3.2"/>
            <circle class="badge" cx="24.6" cy="9.4" r="4.2"/>
          </svg>
        </button>
      </div>
    </aside>

    <main class="content-shell">
      <section class="content-placeholder" aria-label="Existing page content area"></section>
    </main>
  </div>

  <script>
    // Shell only: plug your actual page content into .content-shell.
  </script>
</body>
</html>
